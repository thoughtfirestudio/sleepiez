<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A18"/>
      <stop offset="100%" style="stop-color:#2D2B25"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C43D;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#F4C43D;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="1200" height="630" rx="32"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <!-- Glow -->
    <circle cx="600" cy="200" r="400" fill="url(#glow)"/>
    <!-- Bottom gold accent line -->
    <rect y="620" width="1200" height="10" fill="#F4C43D"/>
    <!-- Football emoji -->
    <text x="600" y="240" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="100" text-anchor="middle" fill="#F4C43D">🏈</text>
    <!-- Title -->
    <text x="600" y="340" font-family="Sora, Inter, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="#F4C43D" letter-spacing="-0.02">Sleepy Joezzz</text>
    <!-- Subtitle -->
    <text x="600" y="400" font-family="Inter, sans-serif" font-size="28" font-weight="500" text-anchor="middle" fill="#9C988E">Fantasy football for the homiez</text>
    <!-- Tag -->
    <rect x="470" y="440" width="260" height="44" rx="22" fill="none" stroke="#F4C43D" stroke-width="2"/>
    <text x="600" y="468" font-family="Inter, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#F4C43D">6 teams · 0.5 PPR</text>
  </g>
</svg>
